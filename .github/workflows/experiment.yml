name: experiment

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Single language to run, or all."
        required: false
        default: "all"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/experiment.yml"
      - "packages/graph/**"
      - "sidecars/**"
      - "tests/experiment/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

# Sixteen jobs per run, so a branch under active review can hold most of the
# available runners in superseded work. Only the current head's real-server
# result is usable — the earlier ones describe code that has already been
# replaced — and keeping them alive delays the one verdict that can gate a
# merge.
#
# A manual dispatch is left alone: somebody asked for that specific run.
concurrency:
  group: experiment-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  experiment:
    name: ${{ matrix.language }} LSP
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        language:
          - typescript
          - go
          - rust
          - cpp
          - c
          - java
          - csharp
          - kotlin
          - swift
          - scala
          - zig
          - python
          - ruby
          - php
          - lua
          - dart

    steps:
      - name: Skip unselected language
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.language != 'all' && inputs.language != matrix.language }}
        run: echo "Skipping ${{ matrix.language }}"

      - name: Checkout
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'all' || inputs.language == matrix.language }}
        uses: actions/checkout@v7

      - name: Enable pnpm
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'all' || inputs.language == matrix.language }}
        run: corepack enable

      - name: Setup Node
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'all' || inputs.language == matrix.language }}
        uses: actions/setup-node@v7
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Go
        if: ${{ matrix.language == 'go' && (github.event_name != 'workflow_dispatch' || inputs.language == 'all' || inputs.language == matrix.language) }}
        uses: actions/setup-go@v7
        with:
          go-version: 1.26.5
          cache-dependency-path: sidecars/go/go.sum

      - name: Setup Swift
        if: ${{ matrix.language == 'swift' && (github.event_name != 'workflow_dispatch' || inputs.language == 'all' || inputs.language == matrix.language) }}
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Install
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'all' || inputs.language == matrix.language }}
        run: pnpm install --frozen-lockfile

      - name: Build package
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'all' || inputs.language == matrix.language }}
        run: pnpm build

      - name: Install language server
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'all' || inputs.language == matrix.language }}
        run: pnpm --filter @samchon/graph-experiment run setup -- --language ${{ matrix.language }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run LSP experiment
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.language == 'all' || inputs.language == matrix.language }}
        run: pnpm --filter @samchon/graph-experiment start -- --language ${{ matrix.language }}

      - name: Upload result
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.language == 'all' || inputs.language == matrix.language) }}
        uses: actions/upload-artifact@v7
        with:
          name: graph-lsp-${{ matrix.language }}
          path: tests/experiment/results/${{ matrix.language }}.json
          if-no-files-found: ignore
