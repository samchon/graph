name: test

# Pull requests gate what is proposed; the push trigger gates what actually
# landed. Without it a merge is only ever validated against the pull request's
# own head, so master carries no verdict of its own — and #62 merged eight
# minutes before its checks reported failure on all three platforms, leaving the
# default branch red with nothing to say so.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# One live run per branch. Without this, a branch under active review queues a
# fresh three-platform run per push while every superseded one still holds
# runners — and the verdict that matters, the one for the current head, waits
# behind results nobody can merge on, because a green check belonging to an
# older SHA proves nothing about this one.
#
# `master` is excluded from cancellation: a push there is the verdict on what
# actually landed, and each commit needs its own.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure pnpm
        run: |
          pnpm config set fetch-retries 5
          pnpm config set fetch-retry-factor 2
          pnpm config set fetch-retry-mintimeout 20000
          pnpm config set fetch-retry-maxtimeout 120000
          pnpm config set registry https://registry.npmjs.org/

      - name: Install
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            pnpm install --frozen-lockfile
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            if ($attempt -eq 3) {
              exit $LASTEXITCODE
            }
            Start-Sleep -Seconds (15 * $attempt)
            if (Test-Path node_modules) {
              Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
            }
          }

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm coverage
